services:
  postgres:
    image: postgres:16
    container_name: boardgames_meetup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-boardgames_meetup_bot}
      POSTGRES_USER: ${DB_USER:-boardgames_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
